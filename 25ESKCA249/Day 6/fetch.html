<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Cards</title>
    <link href="bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body class="bg-light">
    <div class="container py-5">
        <h2 class="text-center mb-4">Student Records</h2>
        <input type="text" id="search" class="form-control mb-4" placeholder="Search Student">
        <div id="container" class="row g-4"></div>
    </div>

    <script>
        fetch('https://jsonplaceholder.typicode.com/users')
            .then(response => {
                if (!response.ok) {
                    throw new Error('failed to fetch data');
                }
                return response.json();
            })
            .then(data => {
                console.log(data);

                let html = "";

                data.forEach(user => {
                    html += `
                    <div class="col-md-4 card-item">
                        <div class="card shadow-sm">
                            <div class="card-body text-center">
                                <h4>${user.name}</h4>

                                <img src="https://i.pravatar.cc/150?img=${user.id}" class="img-fluid rounded-circle mb-3">

                                <button class="btn btn-primary btn-sm mt-2 show-btn">
                                    Show Details
                                </button>

                                <button class="btn btn-danger btn-sm mt-2 hide-btn">
                                    Hide Details
                                </button>

                                <div class="details mt-3" style="display:none;">
                                    <p><strong>City:</strong> ${user.address.city}</p>
                                    <p><strong>Email:</strong> ${user.email}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                    `;
                });

                $("#container").html(html);

                $(".show-btn").click(function () {
                    $(this).nextAll(".details").fadeIn();
                });

                $(".hide-btn").click(function () {
                    $(this).nextAll(".details").fadeOut();
                });

                $("#search").keyup(function () {
                    let value = $(this).val().toLowerCase();

                    $(".card-item").each(function () {
                        let name = $(this).find("h4").text().toLowerCase();

                        if (name.includes(value)) {
                            $(this).show();
                        } else {
                            $(this).hide();
                        }
                    });
                });
            })
            .catch(error => {
                console.error(error);
                $("#container").html('<p class="text-danger text-center">Failed to load student records.</p>');
            });
    </script>
</body>

</html>
