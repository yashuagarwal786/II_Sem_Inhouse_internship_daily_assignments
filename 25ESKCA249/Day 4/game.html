<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruit Click Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Fruit Click Game</h1>

    <div class="timer">
        Time Left: <span id="time">05:00</span>
    </div>

    <div class="game-area">

      
        <div class="fruit-box" id="appleBox">
            <img id="apple"
            src="https://cdn-icons-png.flaticon.com/512/415/415682.png"
            alt="Apple">

            <p>Apple Count :
                <span id="appleCount">0</span>
            </p>
        </div>

       
        <div class="fruit-box" id="strawberryBox">
            <img id="strawberry"
            src="https://cdn-icons-png.flaticon.com/512/590/590772.png"
            alt="Strawberry">

            <p>Strawberry Count :
                <span id="strawberryCount">0</span>
            </p>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
